<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#000; --card:#141414; --card2:#1C1C1E; --line:#262628;
    --text:#FFF; --dim:#8E8E93; --faint:#5A5A5E;
    --green:#5BD98A; --red:#FF6B6B; --teal:#4ECDC4; --amber:#FFC85C; --violet:#A78BFA;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Inter','SF Pro Display',-apple-system,sans-serif;min-height:100%}
  body{padding-bottom:110px;padding-top:env(safe-area-inset-top)}
  .brand{text-align:center;padding:16px 0 4px}
  .brand h1{margin:0;font-size:22px;font-weight:800;letter-spacing:6px}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}
  .pagetitle{font-size:32px;font-weight:700;margin:14px 0 14px}
  .card{background:var(--card);border-radius:24px;padding:18px;margin-bottom:12px}
  .card2{background:var(--card2);border-radius:16px;padding:12px}
  .label{font-size:13px;color:var(--dim);margin-bottom:8px}
  .bignum{font-size:32px;font-weight:700}
  .unit{font-size:14px;color:var(--dim);font-weight:500}
  .row{display:flex;gap:12px}
  .row>*{flex:1}
  textarea{width:100%;background:#0C0C0C;border:1px solid var(--line);border-radius:16px;
    color:var(--text);font-family:inherit;font-size:15px;line-height:1.6;padding:14px;
    min-height:110px;resize:vertical}
  textarea:focus,input:focus{outline:1.5px solid #444}
  input{background:#0C0C0C;border:1px solid var(--line);border-radius:12px;color:var(--text);
    font-family:inherit;font-size:15px;padding:10px 12px;width:100%}
  .btn{border:none;border-radius:16px;padding:14px 0;font-weight:700;font-size:15px;
    cursor:pointer;font-family:inherit;width:100%}
  .btn-w{background:#FFF;color:#000}
  .btn-g{background:var(--green);color:#052912}
  .btn-ghost{background:var(--card2);color:var(--text)}
  .btn:disabled{opacity:.45}
  .chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;
    background:var(--card2);margin-bottom:6px}
  .chip .t1{font-size:14px;font-weight:600}
  .chip .t2{font-size:11.5px;color:var(--dim)}
  .tag{font-size:9px;letter-spacing:1px;border-radius:6px;padding:3px 7px;border:1px solid}
  .x{background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:4px}
  nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#161616;
    border-radius:28px;display:flex;padding:4px 6px;border:1px solid #222;z-index:50}
  nav button{background:none;border:none;color:var(--faint);font-size:19px;padding:10px 15px;
    border-radius:20px;cursor:pointer}
  nav button.on{color:#FFF;background:#2A2A2C}
  .hide{display:none!important}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid #555;border-top-color:#fff;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .dotgrid{display:grid;grid-template-columns:repeat(7,7px);gap:5px;justify-content:center}
  .dot{width:5px;height:5px;border-radius:3px;background:#2A2A2C}
  .dot.on{background:#FFF}
  .staple{font-size:13.5px;padding:9px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .staple:last-child{border-bottom:none}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1E1E1E;
    border:1px solid #333;border-radius:14px;padding:10px 18px;font-size:14px;z-index:99;
    opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  select{background:#0C0C0C;border:1px solid var(--line);border-radius:12px;color:var(--text);
    font-family:inherit;font-size:14px;padding:9px 12px}
  .seg{display:flex;background:var(--card2);border-radius:14px;padding:3px;margin-bottom:12px}
  .seg button{flex:1;border:none;background:none;color:var(--dim);font-family:inherit;
    font-size:13px;font-weight:600;padding:8px 0;border-radius:11px;cursor:pointer}
  .seg button.on{background:#333;color:#fff}
  @media (prefers-reduced-motion: reduce){.spin{animation:none}}
</style>

  <button data-p="progress">📊</button>
  <button data-p="log">＋</button>

<script>
window.onerror = function(msg, src, line, col){
  var el = document.getElementById('app');
  if(el) el.innerHTML = '<div style="background:#2A1215;border:1px solid #5c2b2b;border-radius:16px;padding:16px;font-size:13px;line-height:1.6;color:#ffb3b3">App error (v3.1) — screenshot this for Claude:<br><b>'+String(msg)+'</b><br>line '+line+':'+col+'</div>';
  return false;
};
</script>
<script>
/* =============== STATE =============== */
let D = { lifts:[], foods:[], weights:[], library:{}, goals:[], settings:{cal:2200, protein:150}, coach:null };
let page = "home";
let parsedPending = null;
let parsing = false, coaching = false;

const $ = id => document.getElementById(id);
const localISO = d => { const x=d||new Date(); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); };
const todayISO = () => localISO();
const daysAgoISO = n => localISO(new Date(Date.now()-n*864e5));
const fmtD = iso => { const d=new Date(iso+"T12:00"); return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); };
const esc = s => String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const TAGC = {WORK:'var(--amber)',WARMUP:'var(--faint)',LIBRARY:'var(--teal)',EST:'var(--violet)',LABEL:'var(--green)'};

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function load(){
  try{ const r = localStorage.getItem('htlt:data'); if(r){ D = Object.assign(D, JSON.parse(r)); } }
  catch(e){ /* first run — no data yet */ }
}
async function save(){
  try{ localStorage.setItem('htlt:data', JSON.stringify(D)); }
  catch(e){ toast('⚠ Save failed — storage full?'); }
}
function exportData(){
  const blob = new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'htlt-backup-'+todayISO()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(ev){
  const file = ev.target.files[0]; if(!file) return;
  const rd = new FileReader();
  rd.onload = async ()=>{ try{
    const obj = JSON.parse(rd.result);
    if(!obj || typeof obj!=="object" || !("lifts" in obj)) throw 0;
    D = Object.assign({lifts:[],foods:[],weights:[],library:{},goals:[],settings:{cal:2200,protein:150},coach:null,apiKey:D.apiKey}, obj);
    await save(); toast('✓ Backup restored'); render();
  }catch(e){ toast('⚠ Invalid backup file'); } };
  rd.readAsText(file);
}

/* =============== AI =============== */
async function resolveModel(){
  if(D.model && D.modelCheckedAt && Date.now()-D.modelCheckedAt < 7*864e5) return D.model;
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models?pageSize=200&key="+encodeURIComponent(D.apiKey));
  const data = await res.json();
  if(data.error) throw new Error(data.error.message||"model list failed");
  const models=(data.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes("generateContent"))
    .map(m=>m.name.replace("models/",""))
    .filter(n=>!/embed|image|tts|audio|live|thinking|exp|research|interaction|robotics|computer|aqa|learnlm|gemma/i.test(n));
  // prefer flash-lite (biggest free-tier quota), then flash, then pro
  const score=n=>{
    const ver=parseFloat((n.match(/(\d+(\.\d+)?)/)||[0])[1])||0;
    let s=ver*10;
    if(/flash-lite/.test(n)) s+=5; else if(/flash/.test(n)) s+=4; else if(/pro/.test(n)) s+=2;
    if(/preview/.test(n)) s-=1;
    return s;
  };
  models.sort((a,b)=>score(b)-score(a));
  if(!models.length) throw new Error("no usable models on this key");
  // verify candidates actually answer, walk down the list
  let lastErr="";
  for(const cand of models.slice(0,6)){
    try{
      const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+cand+":generateContent?key="+encodeURIComponent(D.apiKey),{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:"Reply with exactly: OK"}]}],generationConfig:{maxOutputTokens:10}})});
      const j=await r.json();
      if(!j.error){ D.model=cand; D.modelCheckedAt=Date.now(); await save(); return cand; }
      lastErr=j.error.message||"";
      // quota-limited model → skip to next candidate rather than fail
    }catch(e){ lastErr=String(e.message||e); }
  }
  throw new Error("no working model found — last error: "+lastErr);
}

async function callClaude(prompt, maxTokens=1000){
  if(!D.apiKey){ toast('⚠ Add your Gemini API key in Goals → Settings'); throw new Error("no key"); }
  const model = await resolveModel();
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+encodeURIComponent(D.apiKey),{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
      generationConfig:{maxOutputTokens:maxTokens}})
  });
  const data = await res.json();
  if(data.error){
    if(/no longer available|not found/i.test(data.error.message||"")){ D.model=null; D.modelCheckedAt=0; await save(); }
    if(/quota|rate/i.test(data.error.message||"")){ D.model=null; D.modelCheckedAt=0; await save(); toast('⚠ Rate limit hit — wait a minute and try again'); throw new Error("quota — wait ~1 min and retry"); }
    toast('⚠ '+(data.error.message||"API error").slice(0,120));
    throw new Error(data.error.message||"api error");
  }
  const cand = data.candidates && data.candidates[0];
  return cand && cand.content && cand.content.parts ? cand.content.parts.map(p=>p.text||"").join("") : "";
}

async function parseEntry(){
  const text = $('logtext').value.trim();
  if(!text){ toast('Type something first'); return; }
  parsing = true; render();
  const libSummary = Object.entries(D.library).slice(-40).map(([k,v])=>
    `${k}: ${v.cal}cal ${v.p}P ${v.c}C ${v.f}F per "${v.serving}"`).join("\n") || "none yet";
  const prompt = `You are the parser for a personal health log app. The user types free text mixing gym lifts, food, and bodyweight. Parse it into JSON.

USER'S SAVED FOOD LIBRARY (prefer these exact macros when a food matches, tag "LIBRARY"):
${libSummary}

Rules:
- Lifts: one object per set-group. Fields: type:"lift", exercise (canonical name, e.g. "Squat", "Lat Pulldown"), weightKg (number, or 0 if not stated), reps (number, or 0 if not stated), sets (number, default 1), warmup (true/false). "100kg squat for 3" = 1 set of 3 unless sets stated. Tag WORK or WARMUP. An exercise mentioned with NO weight/reps (e.g. just "Lat pulldowns") is still a lift — include it with weightKg 0, reps 0, detail "logged, no numbers".
- Foods: type:"food", name, serving (text), cal, p, c, f (grams, numbers). Estimate for cooked weights unless stated raw. Use library match if close (tag LIBRARY), else estimate (tag EST). Australian products where relevant (e.g. KFC Australia menu items — estimate the full meal including sides and drink unless stated otherwise).
- Bodyweight: type:"weight", kg (number). Only if user states their bodyweight.
- Session labels ("PUSH DAY", "Breakfast", "Lunch"), and notes like "no deadlifts" are context, NOT items — use them to interpret, don't output them.
- Every item gets: label (short display name), detail (short display string), tag.

Respond with ONLY a raw JSON array. No markdown fences, no commentary, no text before or after the array.

User text:
${text}`;
  try{
    let out = await callClaude(prompt, 2000);
    out = out.replace(/```json|```/g,"").trim();
    // robust: extract first top-level JSON array even if wrapped in commentary
    const s = out.indexOf("["), e = out.lastIndexOf("]");
    if(s === -1 || e === -1 || e <= s) throw new Error("no JSON array in response");
    const items = JSON.parse(out.slice(s, e+1));
    if(!Array.isArray(items)) throw new Error("bad shape");
    parsedPending = items;
  }catch(e){ if(!/^auth$|no key/.test(e.message)) toast('⚠ Parse failed: '+String(e.message||e).slice(0,110)); parsedPending = null; }
  parsing = false; render();
}

async function saveParsed(){
  if(!parsedPending) return;
  const date = todayISO(), ts = Date.now();
  for(const it of parsedPending){
    if(it.type==="lift"){
      D.lifts.push({date, ts, exercise:it.exercise, weightKg:+it.weightKg||0, reps:+it.reps||0, sets:+it.sets||1, warmup:!!it.warmup});
    }else if(it.type==="food"){
      const f = {date, ts, name:it.name, serving:it.serving||"", cal:+it.cal||0, p:+it.p||0, c:+it.c||0, f:+it.f||0};
      D.foods.push(f);
      const key = (it.name||"").toLowerCase().trim();
      if(key && !D.library[key]) D.library[key] = {cal:f.cal, p:f.p, c:f.c, f:f.f, serving:f.serving};
    }else if(it.type==="weight" && it.kg){
      D.weights.push({date, ts, kg:+it.kg});
    }
  }
  parsedPending = null; $('logtext') && ($('logtext').value="");
  await save(); toast('✓ Saved'); render();
}

async function runCoach(){
  coaching = true; render();
  const w = D.weights.slice(-12), recentCal = dailyCals(14);
  const goal = D.goals[D.goals.length-1];
  const exSummary = topExercises().slice(0,5).map(e=>{
    const h = exHistory(e); const last = h[h.length-1];
    return `${e}: top set ${last?last.top+"kg":"?"} (${h.length} sessions logged)`;
  }).join("\n");
  const prompt = `You are the AI coach in a personal health app. User is 26M, trains 6-day PPL, prefers 3 working sets of 5 (double progression), Australian.

GOAL: ${goal?`"${goal.text}"${goal.target?` target ${goal.target}`:""}${goal.by?` by ${goal.by}`:""}`:"no explicit goal set"}
BODYWEIGHT (recent): ${w.map(x=>`${fmtD(x.date)} ${x.kg}kg`).join(", ")||"none logged"}
AVG DAILY CALORIES (days with logs, last 14d): ${recentCal.avg?Math.round(recentCal.avg)+" cal over "+recentCal.n+" days":"none logged"}
CALORIE TARGET: ${D.settings.cal} · PROTEIN FLOOR: ${D.settings.protein}g
TRAINING: ${exSummary||"none logged"}

Give a concrete, numbers-first plan/check-in in under 120 words. Plain text, no markdown, no headers. Be direct. If data is thin, say what to log to get a real read. Note this is general guidance, not medical advice, only if genuinely warranted.`;
  try{ D.coach = { at: Date.now(), text: (await callClaude(prompt, 400)).trim() }; await save(); }
  catch(e){ toast('⚠ Coach unavailable — try again'); }
  coaching = false; render();
}

/* =============== DERIVED =============== */
function todayFoods(){ return D.foods.filter(f=>f.date===todayISO()); }
function dailyCals(days){
  const map={}; const cutoff = Date.now()-days*864e5;
  D.foods.forEach(f=>{ if(f.ts>=cutoff){ map[f.date]=(map[f.date]||0)+f.cal; } });
  const vals=Object.values(map);
  return {avg: vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0, n: vals.length};
}
function topExercises(){
  const c={}; D.lifts.forEach(l=>{ if(!l.warmup) c[l.exercise]=(c[l.exercise]||0)+1; });
  return Object.keys(c).sort((a,b)=>c[b]-c[a]);
}
function exHistory(ex){
  const byDate={};
  D.lifts.filter(l=>l.exercise===ex && !l.warmup).forEach(l=>{
    if(!byDate[l.date]) byDate[l.date]={date:l.date, top:0, sets:0};
    byDate[l.date].top = Math.max(byDate[l.date].top, l.weightKg);
    byDate[l.date].sets += l.sets;
  });
  return Object.values(byDate).sort((a,b)=>a.date<b.date?-1:1);
}
function volume7d(){
  const cutoff = Date.now()-7*864e5;
  return D.lifts.filter(l=>l.ts>=cutoff && !l.warmup).reduce((s,l)=>s+l.weightKg*l.reps*l.sets,0);
}
function sessionDates(){ return [...new Set(D.lifts.map(l=>l.date))]; }

/* =============== SVG CHARTS =============== */
function lineChart(points, {w=320,h=120,color="#FFF",unit=""}={}){
  if(points.length<2) return `<div style="color:var(--faint);font-size:13px;padding:20px 0;text-align:center">Log ${2-points.length} more ${points.length?'entry':'entries'} to see a trend</div>`;
  const xs=points.map((_,i)=>i), ys=points.map(p=>p.v);
  const ymin=Math.min(...ys), ymax=Math.max(...ys), pad=(ymax-ymin)*0.15||1;
  const X=i=>10+(w-20)*i/(xs.length-1), Y=v=>h-18-(h-30)*((v-(ymin-pad))/((ymax+pad)-(ymin-pad)));
  const path=points.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
  const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.5" fill="${color}"/>`).join("");
  const labels=points.map((p,i)=> (points.length<=7 || i%Math.ceil(points.length/6)===0 || i===points.length-1) ?
    `<text x="${X(i).toFixed(1)}" y="${h-4}" fill="var(--faint)" font-size="9" text-anchor="middle">${esc(p.l)}</text>`:"").join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto" role="img" aria-label="trend chart">
    <path d="${path}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round"/>${dots}${labels}</svg>`;
}
function barsSets(hist, target=3){
  if(!hist.length) return "";
  const w=320,h=90,bw=Math.min(34,(w-20)/hist.length-8);
  const bars=hist.map((p,i)=>{
    const x=10+(w-20)*i/Math.max(hist.length-1,1)-bw/2;
    const bh=(h-30)*Math.min(p.sets,target)/target;
    const hit=p.sets>=target;
    return `<rect x="${Math.max(2,x).toFixed(1)}" y="${(h-20-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="6" fill="${hit?'#FFF':'#48484A'}"/>
      <text x="${(Math.max(2,x)+bw/2).toFixed(1)}" y="${h-6}" fill="var(--faint)" font-size="9" text-anchor="middle">${esc(fmtD(p.date))}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto"><line x1="10" x2="${w-10}" y1="${h-20-(h-30)}" y2="${h-20-(h-30)}" stroke="var(--faint)" stroke-dasharray="4 4" stroke-width="1"/>${bars}</svg>`;
}
function donut(mac){
  const total=mac.reduce((s,m)=>s+m.cal,0)||1;
  let a0=-90; const r=52, cx=70, cy=70;
  const segs=mac.map(m=>{
    const a1=a0+360*m.cal/total;
    const large=(a1-a0)>180?1:0;
    const p0=[cx+r*Math.cos(a0*Math.PI/180),cy+r*Math.sin(a0*Math.PI/180)];
    const p1=[cx+r*Math.cos(a1*Math.PI/180),cy+r*Math.sin(a1*Math.PI/180)];
    const d=`M${p0[0].toFixed(1)},${p0[1].toFixed(1)} A${r},${r} 0 ${large} 1 ${p1[0].toFixed(1)},${p1[1].toFixed(1)}`;
    a0=a1+2;
    return m.cal>0?`<path d="${d}" stroke="${m.color}" stroke-width="20" fill="none" stroke-linecap="round"/>`:"";
  }).join("");
  return `<svg viewBox="0 0 140 140" style="width:140px;height:140px">${segs}</svg>`;
}
function dotMonths(){
  const now=new Date(); const months=[];
  for(let m=2;m>=0;m--){
    const d=new Date(now.getFullYear(),now.getMonth()-m,1);
    const label=d.toLocaleDateString('en-AU',{month:'short'});
    const days=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const active=new Set(sessionDates().filter(s=>{const x=new Date(s+"T12:00");return x.getMonth()===d.getMonth()&&x.getFullYear()===d.getFullYear();}).map(s=>+s.slice(8)));
    let dots=""; for(let i=1;i<=35;i++) dots+=`<div class="dot ${i<=days&&active.has(i)?'on':''}"></div>`;
    months.push(`<div style="text-align:center"><div style="font-size:12px;color:var(--dim);margin-bottom:8px">${label}</div><div class="dotgrid">${dots}</div></div>`);
  }
  return `<div style="display:flex;justify-content:space-around">${months.join("")}</div>`;
}

/* =============== PAGES =============== */
function macroTile(){
  const t=todayFoods();
  const p=t.reduce((s,f)=>s+f.p,0), c=t.reduce((s,f)=>s+f.c,0), fat=t.reduce((s,f)=>s+f.f,0);
  const cal=t.reduce((s,f)=>s+f.cal,0);
  const mac=[{name:"Protein",g:p,cal:p*4,color:"#4ECDC4"},{name:"Carbs",g:c,cal:c*4,color:"#FFC85C"},{name:"Fat",g:fat,cal:fat*9,color:"#A78BFA"}];
  return `<div class="card">
    <div style="display:flex;align-items:center;gap:10px">
      ${cal?donut(mac):`<div style="width:140px;height:140px;border-radius:50%;border:14px solid #222;flex-shrink:0"></div>`}
      <div style="flex:1">
        <div class="bignum" style="font-size:26px">${cal.toLocaleString()}</div>

let progRange = 7;
function calByDay(nDays){
  const out=[];
  for(let i=nDays-1;i>=0;i--){
    const d=daysAgoISO(i);
    out.push({date:d, cal:D.foods.filter(f=>f.date===d).reduce((s,f)=>s+f.cal,0)});
  }
  return out;
}
function logStreak(){
  const dates=new Set([...D.foods.map(f=>f.date),...D.lifts.map(l=>l.date),...D.weights.map(w=>w.date)]);
  let n=0;
  for(let i=0;;i++){
    const d=daysAgoISO(i);
    if(dates.has(d)) n++;
    else if(i===0) continue; // today not logged yet doesn't break streak
    else break;
  }
  return n;
}
function barChart(points,{h=130,target=null}={}){
  if(!points.length) return "";
  const w=320, bw=Math.max(6,Math.min(26,(w-30)/points.length-6));
  const vmax=Math.max(...points.map(p=>p.v), target||0, 1);
  const bars=points.map((p,i)=>{
    const x=15+(w-30)*(points.length>1?i/(points.length-1):0.5)-bw/2;
    const bh=(h-34)*p.v/vmax;
    return `<rect x="${x.toFixed(1)}" y="${(h-22-bh).toFixed(1)}" width="${bw}" height="${Math.max(bh,1).toFixed(1)}" rx="4" fill="${p.v?'#FFC85C':'#2A2A2C'}"/>
      ${p.l!==undefined?`<text x="${(x+bw/2).toFixed(1)}" y="${h-7}" fill="var(--faint)" font-size="8.5" text-anchor="middle">${esc(p.l)}</text>`:""}`;
  }).join("");
  const tline = target?`<line x1="12" x2="${w-12}" y1="${(h-22-(h-34)*target/vmax).toFixed(1)}" y2="${(h-22-(h-34)*target/vmax).toFixed(1)}" stroke="var(--faint)" stroke-dasharray="4 4" stroke-width="1"/>`:"";
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${tline}${bars}</svg>`;
}
function pageProgress(){
  const n=progRange;
  const days=calByDay(n);
  const logged=days.filter(d=>d.cal>0);
  const avg=logged.length?logged.reduce((s,d)=>s+d.cal,0)/logged.length:0;
  // previous period comparison
  const prevDays=[]; for(let i=2*n-1;i>=n;i--){const d=daysAgoISO(i);prevDays.push(D.foods.filter(f=>f.date===d).reduce((s,f)=>s+f.cal,0));}
  const prevLogged=prevDays.filter(c=>c>0);
  const prevAvg=prevLogged.length?prevLogged.reduce((a,b)=>a+b,0)/prevLogged.length:0;
  const calDelta=prevAvg?Math.round((avg-prevAvg)/prevAvg*100):null;
  const dayL=d=>"SMTWTFS"[new Date(d+"T12:00").getDay()];
  // weight
  const wCut=Date.now()-n*864e5, wPrevCut=Date.now()-2*n*864e5;
  const wNow=D.weights.filter(x=>x.ts>=wCut), wPrev=D.weights.filter(x=>x.ts>=wPrevCut&&x.ts<wCut);
  const wAvg=wNow.length?wNow.reduce((s,x)=>s+x.kg,0)/wNow.length:0;
  const wPrevAvg=wPrev.length?wPrev.reduce((s,x)=>s+x.kg,0)/wPrev.length:0;
  const wDelta=(wAvg&&wPrevAvg)?(wAvg-wPrevAvg):null;
  // goal %
  const goalPct=logged.length?Math.round(100*logged.filter(d=>d.cal<=D.settings.cal*1.05).length/logged.length):0;
  // insights
  const t=todayFoods();
  const pSum=D.foods.filter(f=>f.ts>=wCut).reduce((s,f)=>s+f.p,0), cSum=D.foods.filter(f=>f.ts>=wCut).reduce((s,f)=>s+f.c,0), fSum=D.foods.filter(f=>f.ts>=wCut).reduce((s,f)=>s+f.f,0);
  const macTotal=(pSum*4+cSum*4+fSum*9)||1;
  const protDays=(()=>{const m={};D.foods.filter(f=>f.ts>=wCut).forEach(f=>m[f.date]=(m[f.date]||0)+f.p);const v=Object.values(m);return v.length?Math.round(100*v.filter(x=>x>=D.settings.protein).length/v.length):0;})();
  // most improved lift over range
  let improved=null;
  topExercises().forEach(ex=>{const h=exHistory(ex).filter(x=>x.top>0);const inRange=h.filter(x=>new Date(x.date+"T12:00").getTime()>=wCut);
    if(inRange.length>=2){const gain=inRange[inRange.length-1].top-inRange[0].top;
      if(gain>0&&(!improved||gain>improved.gain)) improved={ex,gain,now:inRange[inRange.length-1].top};}});
  const sessN=sessionDates().filter(d=>new Date(d+"T12:00").getTime()>=wCut).length;
  return `
  <div class="pagetitle">Your progress</div>
  <div style="font-size:13px;color:var(--dim);margin:-8px 0 12px">Small steps, big changes.</div>
  <div class="seg">
    ${[[7,"Week"],[30,"Month"],[90,"3 Months"]].map(([v,l])=>`<button class="${progRange===v?'on':''}" onclick="progRange=${v};render()">${l}</button>`).join("")}
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div class="label" style="margin:0">Calories intake</div>
      ${calDelta!==null?`<div style="font-size:13px;font-weight:600;color:${calDelta<=0?'var(--green)':'var(--amber)'}">${calDelta>0?"↑":"↓"} ${Math.abs(calDelta)}% <span style="color:var(--faint);font-weight:400">vs last period</span></div>`:""}
    </div>
    <div class="bignum" style="margin:4px 0 6px">${Math.round(avg).toLocaleString()}<span class="unit"> cal avg</span></div>
    ${barChart(days.map((d,i)=>({v:d.cal, l:(n<=7||i%Math.ceil(n/7)===0)?dayL(d.date):undefined})),{target:D.settings.cal})}
    <div style="font-size:11.5px;color:var(--faint)">Dashed line = your ${D.settings.cal} cal target</div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div class="label" style="margin:0">Weight trend</div>
      ${wDelta!==null?`<div style="font-size:13px;font-weight:600;color:${wDelta<=0?'var(--green)':'var(--amber)'}">${wDelta>0?"↑":"↓"} ${Math.abs(wDelta).toFixed(1)} kg <span style="color:var(--faint);font-weight:400">vs last period</span></div>`:""}
    </div>
    <div class="bignum" style="margin:4px 0 6px">${wAvg?wAvg.toFixed(1):"–"}<span class="unit"> kg avg</span></div>
    ${lineChart(wNow.map(x=>({v:x.kg,l:fmtD(x.date)})),{color:"#4ECDC4",h:110})}
  </div>
  <div class="row">
    <div class="card" style="margin-bottom:12px">
      <div class="label">Streak</div>
      <div class="bignum">${logStreak()}<span class="unit"> days</span></div>
      <div style="font-size:12px;color:var(--dim)">${logStreak()>0?"Keep it up!":"Log today to start one"}</div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="label">Daily goal</div>
      <div class="bignum">${goalPct}<span class="unit">%</span></div>
      <div style="font-size:12px;color:${goalPct>=70?'var(--green)':'var(--dim)'}">${goalPct>=70?"On track!":"days at/under target"}</div>
    </div>
  </div>
  <div class="pagetitle" style="font-size:24px;margin:6px 0 12px">Insights</div>
  <div class="card">
    <div class="label">This period</div>
    <div style="font-size:13.5px;line-height:1.8">
      🏋️ ${sessN} training session${sessN===1?"":"s"} logged<br>
      ${improved?`📈 Most improved: <b>${esc(improved.ex)}</b> +${improved.gain}kg → ${improved.now}kg<br>`:`📈 No lift PRs yet this period — log weights to track gains<br>`}
      🥩 Protein floor hit on <b>${protDays}%</b> of logged days<br>

    </div>
  </div>`;
}

}

async function saveSettings(){
  D.settings.cal = parseInt($('scal').value)||2200;
  D.settings.protein = parseInt($('sprot').value)||150;
  D.apiKey = $('skey').value.trim();
  await save(); toast('✓ Settings saved'); render();
}

/* =============== RENDER =============== */
function render(){
  const pages={home:pageHome, progress:pageProgress, log:pageLog, training:pageTraining, nutrition:pageNutrition, goals:pageGoals};
  $('app').innerHTML = pages[page]();
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.p===page));
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{ page=b.dataset.p; render(); window.scrollTo(0,0); });

(async()=>{ await load(); render(); })();
</script>
